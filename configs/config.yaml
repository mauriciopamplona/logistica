application:
  name: BigCore Logistics Pipeline

spark:
  master: local[*]

paths:
  drivers: data/motoristas
  travels: data/viagens
  vehicles: data/veiculos
  tracking: data/rastreamento
  geofences: data/geocercas

output:
  raw: output/raw
  trusted: output/trusted
  analytics: output/analytics

quality:

  vehicles:
    required_columns:
      - veiculo_id
      - placa
      - status

  drivers:
    required_columns:
      - motorista_id
      - nome

  travels:
    required_columns:
      - viagem_id
      - motorista_id
      - veiculo_id

  tracking:
    required_columns:
      - veiculo_id
      - timestamp
      - latitude
      - longitude  